<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1726"/>
      <stop offset="1" stop-color="#15233B"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="256" x2="416" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Kalkan / Shield -->
  <path d="M256 40 L432 104 V268 C432 372 360 440 256 472 C152 440 80 372 80 268 V104 Z"
        fill="url(#bg)" stroke="url(#accent)" stroke-width="14"/>

  <!-- Engelleyici duvar (DPI bariyeri) -->
  <rect x="236" y="150" width="40" height="212" rx="8" fill="#EF4444" opacity="0.85"/>

  <!-- Parçalanan paket akışı (fragmentation) - duvarın içinden geçen kesik çizgiler -->
  <g stroke="url(#accent)" stroke-width="20" stroke-linecap="round">
    <line x1="120" y1="200" x2="208" y2="200"/>
    <line x1="304" y1="200" x2="392" y2="200"/>

    <line x1="120" y1="256" x2="196" y2="256"/>
    <line x1="216" y1="256" x2="296" y2="256"/>
    <line x1="316" y1="256" x2="392" y2="256"/>

    <line x1="120" y1="312" x2="208" y2="312"/>
    <line x1="304" y1="312" x2="392" y2="312"/>
  </g>

  <!-- Ok ucu: trafiğin geçtiğini gösterir -->
  <path d="M372 232 L412 256 L372 280 Z" fill="url(#accent)"/>
</svg>
